<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Premium Security Locks</title>
<link rel="icon" type="image/png" href="logo DOOR.png" alt="Modern security door">

<style>
:root{
--bg:#0b0c10;
--gold:#d4af37;
--panel-bg: #161b23;
--card-bg: #1b212c;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:var(--bg);
font-family:'Segoe UI', Arial, sans-serif;
color:#fff;
overflow-x:hidden;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 8%;
border-bottom:1px solid #222;
position:relative;
z-index: 1000;
}

.logo{
font-size:24px;
font-weight:700;
letter-spacing: 2px;
}

.logo span{
color:var(--gold);
}

.menu{
display:none;
background:none;
border:none;
color:white;
font-size:34px;
cursor:pointer;
transition: transform 0.3s ease;
}

/* Hamburger button rotation on click */
.menu.open {
transform: rotate(90deg);
color: var(--gold);
}

nav{
display:flex;
gap:25px;
align-items:center;
}

nav a{
text-decoration:none;
color:#888;
font-size: 14px;
letter-spacing: 1px;
text-transform: uppercase;
transition: .3s;
cursor: pointer;
padding: 6px 12px;
}

nav a.active, nav a:hover{
color:var(--gold);
}

nav a#navAccessories {
border: 1px solid var(--gold);
border-radius: 999px;
color: var(--gold);
padding: 10px 24px;
font-weight: 600;
box-shadow: 0 0 10px rgba(212, 175, 55, 0.1);
transition: all 0.4s ease;
}

nav a#navAccessories:hover, nav a#navAccessories.active {
background: var(--gold);
color: #000 !important;
box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
transform: translateY(-1px);
}

.container{
padding:50px 8%;
width: 100%;
}

.panel{
background:linear-gradient(180deg,#161b23,#11151d);
padding:45px;
border-radius:28px;
border: 1px solid rgba(255, 255, 255, 0.03);
width: 100%;
}

.heading{
text-align:center;
font-size:38px;
font-weight: 800;
letter-spacing: 2px;
margin-bottom:10px;
text-transform: uppercase;
}

.sub{
text-align:center;
color:var(--gold);
margin-bottom:35px;
font-size: 14px;
letter-spacing: 3px;
text-transform: uppercase;
}

/* MOBILE IN-PAGE NAVIGATION */
.mobile-nav-box {
display: none;
justify-content: center;
gap: 20px;
margin-bottom: 30px;
}

.mobile-nav-link {
font-size: 13px;
letter-spacing: 1.5px;
text-transform: uppercase;
color: #666;
text-decoration: none;
padding: 5px 10px;
border-bottom: 2px solid transparent;
cursor: pointer;
font-weight: 600;
}

.mobile-nav-link.active {
color: var(--gold);
border-color: var(--gold);
}

/* NAVIGATION TABS (BY TYPE) */
.category-tabs {
display: flex;
justify-content: center;
gap: 20px;
margin-bottom: 50px;
border-bottom: 1px solid rgba(255,255,255,0.05);
padding-bottom: 20px;
width: 100%;
}

.tab-btn {
background: none;
border: none;
color: #888;
font-size: 16px;
font-weight: 600;
padding: 10px 25px;
cursor: pointer;
transition: .3s;
position: relative;
letter-spacing: 1px;
}

.tab-btn:hover, .tab-btn.active {
color: var(--gold);
}

.tab-btn.active::after {
content: '';
position: absolute;
bottom: -21px;
left: 0;
width: 100%;
height: 2px;
background: var(--gold);
}

/* SECOND PANEL (FILTER SECTION) */
.brand-grid-container {
margin-top: 30px;
padding: 25px;
background: rgba(255, 255, 255, 0.01);
border-radius: 20px;
border: 1px solid rgba(255, 255, 255, 0.04);
backdrop-filter: blur(10px);
position: relative;
width: 100%;
}

.section-title {
font-size: 12px;
color: #666;
letter-spacing: 3px;
text-transform: uppercase;
margin-bottom: 22px;
text-align: center;
font-weight: 700;
}

.brand-flex-list {
display: flex;
justify-content: center;
gap: 16px;
flex-wrap: wrap;
width: 100%;
}

.brand-card {
background: #141923;
border: 1px solid rgba(255, 255, 255, 0.06);
padding: 16px 40px;
border-radius: 14px;
cursor: pointer;
transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
min-width: 150px;
text-align: center;
font-weight: 600;
font-size: 14px;
letter-spacing: 1.5px;
color: #888;
box-shadow: 0 4px 6px rgba(0, 0, 0, 0.15);
position: relative;
overflow: hidden;
}

.brand-card:hover {
color: #fff;
border-color: rgba(212, 175, 55, 0.4);
background: #1a202c;
transform: translateY(-4px);
box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
}

.brand-card.active {
border-color: var(--gold);
color: var(--gold);
background: linear-gradient(145deg, #1b212c, #11151d);
box-shadow: 0 0 15px rgba(212, 175, 55, 0.15);
font-weight: 700;
}

.brand-card.active::before {
content: '';
position: absolute;
top: 0;
left: 50%;
transform: translateX(-50%);
width: 40%;
height: 3px;
background: var(--gold);
border-radius: 0 0 4px 4px;
}

/* LOCK PRODUCT GRID */
.lock-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:30px;
margin-top:40px;
will-change: transform;
}

.card{
background:var(--card-bg);
border-radius:20px;
overflow:hidden;
transition:.4s cubic-bezier(0.165, 0.84, 0.44, 1);
border: 1px solid rgba(255,255,255,0.02);
cursor: pointer;
display: flex;
flex-direction: column;
justify-content: space-between;
contain: content;
}

.card:hover{
transform:translateY(-5px);
box-shadow: 0 12px 24px rgba(0,0,0,0.5);
border-color: rgba(214, 175, 55, 0.2);
}

.card .img-box {
width: 100%;
height: 240px;
overflow: hidden;
background: #111;
}

.card img{
width:100%;
height:100%;
object-fit:cover;
display:block;
transition: .5s;
}

.card:hover img {
transform: scale(1.05);
}

.info{
padding:20px;
background: linear-gradient(to bottom, #1b212c, #141922);
flex-grow: 1;
display: flex;
flex-direction: column;
}

.info h3{
color:#fff;
font-size: 16px;
margin-bottom:6px;
font-weight: 600;
}

.info .brand-tag {
font-size: 10px;
color: var(--gold);
text-transform: uppercase;
letter-spacing: 1.5px;
margin-bottom: 8px;
display: inline-block;
}

.info p{
color:#888;
font-size: 13px;
line-height: 1.5;
margin-bottom: 12px;
}

/* --- PRICE STYLING --- */
.price-box {
display: flex;
align-items: center;
gap: 10px;
margin-bottom: 15px;
margin-top: auto;
}

.offer-price {
color: #fff;
font-size: 18px;
font-weight: 700;
}

.original-price {
color: #666;
text-decoration: line-through;
font-size: 13px;
}

.discount-badge {
background: rgba(212, 175, 55, 0.1);
color: var(--gold);
padding: 2px 6px;
border-radius: 4px;
font-size: 11px;
font-weight: 600;
}

.book-btn {
width: 100%;
padding: 12px;
background: transparent;
border: 1px solid rgba(212, 175, 55, 0.4);
color: var(--gold);
border-radius: 10px;
font-weight: 600;
cursor: pointer;
transition: .2s;
text-transform: uppercase;
letter-spacing: 1px;
font-size: 12px;
}

.book-btn:hover {
background: var(--gold);
color: #000;
border-color: var(--gold);
}

/* --- PRODUCT DETAILS PAGE (MODAL) STYLES --- */
.detail-overlay {
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
background: rgba(11, 12, 16, 0.98);
z-index: 2000;
display: none;
justify-content: center;
align-items: center;
padding: 20px;
overflow-y: auto;
}

.detail-container {
background: var(--panel-bg);
border: 1px solid rgba(212, 175, 55, 0.2);
max-width: 900px;
width: 100%;
border-radius: 24px;
overflow: hidden;
position: relative;
display: flex;
box-shadow: 0 20px 50px rgba(0,0,0,0.7);
animation: fadeIn 0.4s ease;
}

@keyframes fadeIn {
from { opacity: 0; transform: scale(0.95); }
to { opacity: 1; transform: scale(1); }
}

.close-detail-btn {
position: absolute;
top: 20px;
right: 20px;
background: rgba(255,255,255,0.1);
border: none;
color: #fff;
font-size: 24px;
width: 45px;
height: 45px;
border-radius: 50%;
cursor: pointer;
display: flex;
justify-content: center;
align-items: center;
transition: 0.3s;
z-index: 10;
}

.close-detail-btn:hover {
background: var(--gold);
color: #000;
}

.detail-img-box {
flex: 1;
min-height: 450px;
background: #000;
}

.detail-img-box img {
width: 100%;
height: 100%;
object-fit: cover;
}

.detail-info-box {
flex: 1;
padding: 40px;
display: flex;
flex-direction: column;
justify-content: center;
}

.detail-tag {
color: var(--gold);
font-size: 12px;
letter-spacing: 3px;
text-transform: uppercase;
margin-bottom: 10px;
font-weight: 700;
}

.detail-title {
font-size: 28px;
font-weight: 700;
margin-bottom: 15px;
line-height: 1.3;
}

.detail-price-box {
display: flex;
align-items: center;
gap: 15px;
margin-bottom: 20px;
background: rgba(255,255,255,0.02);
padding: 12px 20px;
border-radius: 12px;
border: 1px solid rgba(255,255,255,0.04);
}

.detail-offer {
font-size: 24px;
font-weight: 700;
color: var(--gold);
}

.detail-original {
font-size: 15px;
color: #666;
text-decoration: line-through;
}

.detail-desc {
color: #aaa;
font-size: 15px;
line-height: 1.7;
margin-bottom: 30px;
}

.detail-action-btns {
display: flex;
gap: 15px;
}

.whatsapp-btn {
flex: 1;
padding: 15px;
background: #25d366;
color: #fff;
border: none;
border-radius: 12px;
font-weight: 700;
text-transform: uppercase;
letter-spacing: 1px;
cursor: pointer;
text-align: center;
text-decoration: none;
font-size: 13px;
transition: 0.3s;
}

.whatsapp-btn:hover {
background: #20ba5a;
box-shadow: 0 5px 15px rgba(37, 211, 102, 0.3);
}

@media(max-width:768px){
header{ padding:16px 5%; }
.logo{ font-size:20px; }
.menu{ display:block; }

nav{
display: flex;
position:absolute;
top:75px;
right:15px;
width:240px;
background: rgba(17, 21, 29, 0.96);
backdrop-filter:blur(20px);
padding:18px;
border-radius:20px;
border: 1px solid rgba(255, 255, 255, 0.05);
flex-direction:column;
gap:4px;
z-index:999;
align-items: stretch;
opacity: 0;
transform: translateY(-20px) scale(0.95);
pointer-events: none;
transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
}

nav.show{ 
opacity: 1; 
transform: translateY(0) scale(1);
pointer-events: auto;
box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
}

nav a{ 
padding:12px 16px; 
border-radius:12px; 
opacity: 0;
transform: translateX(-10px);
transition: all 0.3s ease;
}

nav a:hover{ background:#1c222e; color: var(--gold); }

nav.show a {
opacity: 1;
transform: translateX(0);
}
nav.show a:nth-child(1) { transition-delay: 0.1s; }
nav.show a:nth-child(2) { transition-delay: 0.15s; }
nav.show a:nth-child(3) { transition-delay: 0.2s; }
nav.show a:nth-child(4) { transition-delay: 0.25s; }

nav a#navAccessories {
border: none;
border-radius: 12px;
padding: 12px 16px;
box-shadow: none;
color: #888;
font-weight: normal;
}
nav a#navAccessories:hover, nav a#navAccessories.active {
background: #1c222e;
color: var(--gold) !important;
box-shadow: none;
transform: none;
}

.mobile-nav-box { display: flex; }
.container{ padding:12px; width:100%; }
.panel{ padding:16px; border-radius:20px; width:100%; }
.heading{ font-size:22px; }

.brand-grid-container { padding: 12px; border-radius: 14px; margin-top: 15px; width:100%; }
.section-title { margin-bottom: 15px; }

.category-tabs {
overflow-x: auto;
justify-content: flex-start;
scrollbar-width: none;
padding-bottom: 12px;
margin-bottom: 25px;
white-space: nowrap;
-webkit-overflow-scrolling: touch;
width:100%;
}
.category-tabs::-webkit-scrollbar { display: none; }
.tab-btn { display: inline-block; padding: 8px 16px; font-size: 13px; }
.tab-btn.active::after { bottom: -13px; }

.brand-grid-container::after { display:none; }

.brand-flex-list { 
justify-content: flex-start; 
overflow-x: auto; 
flex-wrap: nowrap; 
padding-bottom: 4px; 
gap: 10px;
width: 100%;
}

.brand-card { min-width: 120px; padding: 10px 20px; font-size: 12px;}
.lock-grid{ grid-template-columns: repeat(2, 1fr) !important; gap: 10px !important; margin-top: 20px; }

.card .img-box { height: 140px; }
.info { padding: 10px; }
.info h3 { font-size: 13px; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.info p { font-size: 11px; margin-bottom: 6px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.3; }
.price-box { gap: 6px; margin-bottom: 10px; }
.offer-price { font-size: 14px; }
.original-price { font-size: 11px; }
.discount-badge { font-size: 9px; padding: 1px 4px; }
.book-btn { padding: 8px 4px; font-size: 10px; border-radius: 6px; }

/* Details Responsive */
.detail-container {
flex-direction: column;
max-height: 90vh;
overflow-y: auto;
}
.detail-img-box {
min-height: 250px;
height: 250px;
}
.detail-info-box {
padding: 20px;
}
.detail-title {
font-size: 20px;
margin-bottom: 10px;
}
.detail-price-box {
padding: 8px 15px;
margin-bottom: 15px;
}
.detail-offer { font-size: 18px; }
.detail-original { font-size: 13px; }
.detail-desc {
font-size: 13px;
margin-bottom: 20px;
}
}
</style>
</head>

let currentCategory = 'door_locks';

function handleNavClick(menuType) {
    // സുരക്ഷിതമായി ക്ലാസുകൾ മാറ്റാൻ ആദ്യം എലമെന്റുകൾ ഉണ്ടോ എന്ന് ചെക്ക് ചെയ്യുന്നു
    const navLocks = document.getElementById("navLocks");
    const navAccessories = document.getElementById("navAccessories");
    const mobLocks = document.getElementById("mobLocks");
    const mobAccessories = document.getElementById("mobAccessories");
    
    if(navLocks) navLocks.classList.remove("active");
    if(navAccessories) navAccessories.classList.remove("active");
    if(mobLocks) mobLocks.classList.remove("active");
    if(mobAccessories) mobAccessories.classList.remove("active");
    
    if(menuType === 'accessories') {
        if(navAccessories) navAccessories.classList.add("active");
        if(mobAccessories) mobAccessories.classList.add("active");
        
        document.getElementById("categoryTabsOuter").style.display = "none"; 
        document.getElementById("mainHeading").innerText = "PREMIUM ACCESSORIES";
        document.getElementById("mainSub").innerText = "Architectural Hardware & Styling";
        switchCategory('accessories', null);
    } else {
        if(navLocks) navLocks.classList.add("active");
        if(mobLocks) mobLocks.classList.add("active");
        
        document.getElementById("categoryTabsOuter").style.display = "flex"; 
        document.getElementById("mainHeading").innerText = "EXQUISITE COLLECTION";
        document.getElementById("mainSub").innerText = "Filter by Premium Categories";
        
        const firstTab = document.querySelector(".tab-btn");
        switchCategory('door_locks', firstTab);
    }
    
    document.getElementById("nav").classList.remove("show");
    document.getElementById("menuBtn").classList.remove("open");
}

function switchCategory(catName, element) {
    currentCategory = catName;

    if(element) {
        document.querySelectorAll(".tab-btn").forEach(btn => btn.classList.remove("active"));
        element.classList.add("active");
    }

    const filterTitle = document.getElementById("filterTitle");
    const filterList = document.getElementById("filterList");

    if(catName === 'accessories') {
        filterTitle.innerText = "EXPLORE BY ACCESSORY TYPE";
    } else {
        filterTitle.innerText = "FILTER BY BRAND";
    }

    filterList.innerHTML = "";
    document.getElementById("lockGrid").innerHTML = "";

    Object.keys(data[catName]).forEach((filterItem, index) => {
        const activeClass = index === 0 ? 'active' : '';
        filterList.innerHTML += `
            <div class="brand-card ${activeClass}" onclick="loadProducts('${filterItem}', this)">
                ${filterItem}
            </div>
        `;
    });

    const firstFilter = filterList.querySelector(".brand-card");
    if(firstFilter) {
        firstFilter.click();
    }
}

function loadProducts(filterKey, element) {
    document.querySelectorAll(".brand-card").forEach(card => card.classList.remove("active"));
    element.classList.add("active");

    const grid = document.getElementById("lockGrid");
    grid.innerHTML = "";

    data[currentCategory][filterKey].forEach(lock => {
        const offerPrice = lock[3];
        const origPrice = lock[4];
        const discount = Math.round(((origPrice - offerPrice) / origPrice) * 100);

        // Safe string escaping for onClick event injection
        const titleEscaped = lock[0].replace(/'/g, "\\'");
        const imgEscaped = lock[1].replace(/'/g, "\\'");
        const descEscaped = lock[2].replace(/'/g, "\\'");
        const tagEscaped = filterKey.replace(/'/g, "\\'");

        grid.innerHTML += `
            <div class="card" onclick="openProductDetail('${titleEscaped}', '${imgEscaped}', '${descEscaped}', '${tagEscaped}', ${offerPrice}, ${origPrice})">
                <div class="img-box">
                    <img src="${lock[1]}" alt="${lock[0]}" loading="lazy">
                </div>
                <div class="info">
                    <span class="brand-tag">${filterKey}</span>
                    <h3>${lock[0]}</h3>
                    <p>${lock[2]}</p>
                    <div class="price-box">
                        <span class="offer-price">₹${offerPrice.toLocaleString('en-IN')}</span>
                        <span class="original-price">₹${origPrice.toLocaleString('en-IN')}</span>
                        <span class="discount-badge">${discount}% OFF</span>
                    </div>
                    <button class="book-btn" onclick="event.stopPropagation(); alert('${titleEscaped} booking request received!')">Book Now</button>
                </div>
            </div>
        `;
    });
}

/* --- PRODUCT DETAILS FUNCTIONS --- */
function openProductDetail(title, img, desc, tag, offerPrice, origPrice) {
    document.getElementById("detailTitle").innerText = title;
    document.getElementById("detailImg").src = img;
    document.getElementById("detailDesc").innerText = desc;
    document.getElementById("detailTag").innerText = tag;
    
    document.getElementById("detailOfferPrice").innerText = "₹" + offerPrice.toLocaleString('en-IN');
    document.getElementById("detailOriginalPrice").innerText = "₹" + origPrice.toLocaleString('en-IN');
    
    document.getElementById("detailBookBtn").onclick = function() {
        alert(title + ' booking request received!');
    };

    // WhatsApp Configuration (Change '919000000000' to your real business phone number)
    const whatsappNumber = "919000000000"; 
    const whatsappMessage = encodeURIComponent("Hello, I'm interested in the product: " + title + " (" + tag + ") listed for ₹" + offerPrice.toLocaleString('en-IN') + ". Can I get more details?");
    document.getElementById("detailWhatsappBtn").href = "https://wa.me/" + whatsappNumber + "?text=" + whatsappMessage;

    document.getElementById("productDetailModal").style.display = "flex";
    document.body.style.overflow = "hidden"; // Lock background scrolling
}

function closeProductDetail() {
    document.getElementById("productDetailModal").style.display = "none";
    document.body.style.overflow = "auto"; // Unlock scroll
}

window.onclick = function(event) {
    const modal = document.getElementById("productDetailModal");
    if (event.target == modal) {
        closeProductDetail();
    }
}

// Initial Run
switchCategory('door_locks', document.querySelector(".tab-btn"));
