<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Premium Security Locks</title>
<link rel="icon" type="image/png" href="favicon2.png">

<style>
:root{
--bg:#0b0c10;
--gold:#d4af37;
--panel-bg: #161b23;
--card-bg: #1b212c;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:var(--bg);
font-family:'Segoe UI', Arial, sans-serif;
color:#fff;
overflow-x:hidden;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 8%;
border-bottom:1px solid #222;
position:relative;
z-index: 1000;
}

.logo{
font-size:24px;
font-weight:700;
letter-spacing: 2px;
}

.logo span{
color:var(--gold);
}

.menu{
display:none;
flex-direction:column;
gap:5px;
cursor:pointer;
transition: transform 0.3s ease;
background:transparent;
border:none;
padding:0;
}

.menu span{
width:30px;
height:3px;
background:#fff;
transition: all 0.3s ease;
display: block;
}

.menu.open span:nth-child(1) {
transform: rotate(45deg) translate(5px, 6px);
background: #fff;
}
.menu.open span:nth-child(2) {
opacity: 0;
}
.menu.open span:nth-child(3) {
transform: rotate(-45deg) translate(5px, -6px);
background: #fff;
}

nav{
display:flex;
gap:25px;
align-items:center;
}

nav a{
text-decoration:none;
color:#888;
font-size: 14px;
letter-spacing: 1px;
text-transform: uppercase;
transition: .3s;
cursor: pointer;
padding: 6px 12px;
}

nav a.active, nav a:hover{
color:var(--gold);
}

nav a#navAccessories {
border: 1px solid var(--gold);
border-radius: 999px;
color: var(--gold);
padding: 10px 24px;
font-weight: 600;
box-shadow: 0 0 10px rgba(212, 175, 55, 0.1);
transition: all 0.4s ease;
}

nav a#navAccessories:hover, nav a#navAccessories.active {
background: var(--gold);
color: #000 !important;
box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
transform: translateY(-1px);
}

.container{
padding:50px 8%;
width: 100%;
}

.panel{
background:gradient(180deg,#161b23,#11151d);
background:linear-gradient(180deg,#161b23,#11151d);
padding:45px;
border-radius:28px;
border: 1px solid rgba(255, 255, 255, 0.03);
width: 100%;
}

.heading{
text-align:center;
font-size:38px;
font-weight: 800;
letter-spacing: 2px;
margin-bottom:10px;
text-transform: uppercase;
}

.sub{
text-align:center;
color:var(--gold);
margin-bottom:35px;
font-size: 14px;
letter-spacing: 3px;
text-transform: uppercase;
}

.mobile-nav-box {
display: none;
justify-content: center;
gap: 20px;
margin-bottom: 30px;
}

.mobile-nav-link {
font-size: 13px;
letter-spacing: 1.5px;
text-transform: uppercase;
color: #666;
text-decoration: none;
padding: 5px 10px;
border-bottom: 2px solid transparent;
cursor: pointer;
font-weight: 600;
}

.mobile-nav-link.active {
color: var(--gold);
border-color: var(--gold);
}

.category-tabs {
display: flex;
justify-content: center;
gap: 20px;
margin-bottom: 50px;
border-bottom: 1px solid rgba(255,255,255,0.05);
padding-bottom: 20px;
width: 100%;
}

.tab-btn {
background:transparent;
border: none;
color: #888;
font-size: 16px;
font-weight: 600;
padding: 10px 25px;
cursor: pointer;
transition: .3s;
position: relative;
letter-spacing: 1px;
}

.tab-btn:hover, .tab-btn.active {
color: var(--gold);
}

.tab-btn.active::after {
content: '';
position: absolute;
bottom: -21px;
left: 0;
width: 100%;
height: 2px;
background: var(--gold);
}

.brand-grid-container {
margin-top: 30px;
padding: 25px;
background: rgba(255, 255, 255, 0.01);
border-radius: 20px;
border: 1px solid rgba(255, 255, 255, 0.04);
backdrop-filter: blur(10px);
position: relative;
width: 100%;
}

.section-title {
font-size: 12px;
color: #666;
letter-spacing: 3px;
text-transform: uppercase;
margin-bottom: 22px;
text-align: center;
font-weight: 700;
}

.brand-flex-list {
display: flex;
justify-content: center;
gap: 16px;
flex-wrap: wrap;
width: 100%;
}

.brand-card {
background: #141923;
border: 1px solid rgba(255, 255, 255, 0.06);
padding: 16px 40px;
border-radius: 14px;
cursor: pointer;
transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
min-width: 150px;
text-align: center;
font-weight: 600;
font-size: 14px;
letter-spacing: 1.5px;
color: #888;
box-shadow: 0 4px 6px rgba(0, 0, 0, 0.15);
position: relative;
overflow: hidden;
}

.brand-card:hover {
color: var(--gold);
border-color: rgba(212, 175, 55, 0.4);
background: #1a202c;
transform: translateY(-4px);
box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
}

.brand-card.active {
border-color: var(--gold);
color: var(--gold);
background: linear-gradient(145deg, #1b212c, #11151d);
box-shadow: 0 0 15px rgba(212, 175, 55, 0.15);
font-weight: 700;
}

.brand-card.active::before {
content: '';
position: absolute;
top: 0;
left: 50%;
transform: translateX(-50%);
width: 40%;
height: 3px;
background: var(--gold);
border-radius: 0 0 4px 4px;
}

.lock-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:30px;
margin-top:40px;
will-change: transform;
}

.card{
background:var(--card-bg);
border-radius:20px;
overflow:hidden;
transition:.4s cubic-bezier(0.165, 0.84, 0.44, 1);
border: 1px solid rgba(255,255,255,0.02);
cursor: pointer;
display: flex;
flex-direction: column;
justify-content: space-between;
contain: content;
}

.card:hover{
transform:translateY(-5px);
box-shadow: 0 12px 24px rgba(0,0,0,0.5);
border-color: rgba(214, 175, 55, 0.2);
}

.card .img-box {
width: 100%;
height: 240px;
overflow: hidden;
background: #111;
}

.card img{
width:100%;
height:100%;
object-fit:cover;
display:block;
transition: .5s;
}

.card:hover img {
transform: scale(1.05);
}

.info{
padding:20px;
background: linear-gradient(to bottom, #1b212c, #141922);
flex-grow: 1;
display: flex;
flex-direction: column;
}

.info h3{
color:#fff;
font-size: 16px;
margin-bottom:6px;
font-weight: 600;
}

.info .brand-tag {
font-size: 10px;
color: var(--gold);
text-transform: uppercase;
letter-spacing: 1.5px;
margin-bottom: 8px;
display: inline-block;
}

.info p{
color:#888;
font-size: 13px;
line-height: 1.5;
margin-bottom: 10px;
}

.for-more-badge {
align-self: flex-start;
background: #11151d;
color: #fff;
border: 1px solid rgba(255, 255, 255, 0.1);
padding: 5px 14px;
border-radius: 20px;
font-size: 11px;
font-weight: 700;
letter-spacing: 1px;
margin-bottom: 15px;
text-transform: uppercase;
display: inline-block;
}

.price-box {
display: flex;
align-items: center;
gap: 10px;
margin-bottom: 15px;
margin-top: auto;
flex-wrap: wrap;
}

.offer-price {
color: #fff;
font-size: 18px;
font-weight: 700;
}

.original-price {
color: #666;
text-decoration: line-through;
font-size: 13px;
}

.discount-badge {
background: rgba(212, 175, 55, 0.1);
color: var(--gold);
padding: 2px 6px;
border-radius: 4px;
font-size: 11px;
font-weight: 600;
}

.book-btn {
width: 100%;
padding: 12px;
background: transparent;
border: 1px solid rgba(212, 175, 55, 0.4);
color: var(--gold);
border-radius: 10px;
font-weight: 600;
cursor: pointer;
transition: .2s;
text-transform: uppercase;
letter-spacing: 1px;
font-size: 12px;
}

.book-btn:hover {
background: var(--gold);
color: #000;
border-color: var(--gold);
}

.store-info-banner {
margin-top: 40px;
padding: 18px;
background: rgba(212, 175, 55, 0.02);
border: 1px dashed rgba(212, 175, 55, 0.3);
border-radius: 12px;
text-align: center;
color: var(--gold);
font-size: 13px;
font-weight: 600;
letter-spacing: 1px;
width: 100%;
display: block;
}

.detail-overlay {
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
background: rgba(11, 12, 16, 0.98);
z-index: 2000;
display: none;
justify-content: center;
align-items: center;
padding: 20px;
overflow-y: auto;
}

.detail-container {
background: var(--panel-bg);
border: 1px solid rgba(212, 175, 55, 0.2);
max-width: 900px;
width: 100%;
border-radius: 24px;
overflow: hidden;
position: relative;
display: flex;
box-shadow: 0 20px 50px rgba(0,0,0,0.7);
animation: fadeIn 0.4s ease;
}

@keyframes fadeIn {
from { opacity: 0; transform: scale(0.95); }
to { opacity: 1; transform: scale(1); }
}

.close-detail-btn {
position: absolute;
top: 20px;
right: 20px;
background: rgba(212,175,55,.08);
border:2px solid var(--gold);
color: var(--gold);
font-size: 24px;
width: 45px;
height: 45px;
border-radius: 50%;
cursor: pointer;
display: flex;
justify-content: center;
align-items: center;
transition: 0.3s;
z-index: 2010;
}

.close-detail-btn:hover {
background:var(--gold);
color:#000;
border:2px solid var(--gold);
box-shadow:0 0 25px var(--gold),0 0 40px rgba(212,175,55,.5);
}

.detail-img-box {
flex: 1;
min-height: 450px;
background: #000;
position: relative;
overflow: hidden;
}

.slider-wrapper {
display: flex;
width: 100%;
height: 100%;
transition: transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
}

.slider-wrapper img {
width: 100%;
height: 100%;
object-fit: cover;
flex-shrink: 0;
}

.slider-btn {
position: absolute;
top: 50%;
transform: translateY(-50%);
background: rgba(0, 0, 0, 0.6);
border: 1px solid rgba(255, 255, 255, 0.1);
color: white;
font-size: 20px;
width: 40px;
height: 40px;
border-radius: 50%;
cursor: pointer;
display: flex;
justify-content: center;
align-items: center;
transition: 0.3s;
z-index: 10;
}

.slider-btn:hover {
background: var(--gold);
color: black;
}

.prev-btn { left: 15px; }
.next-btn { right: 15px; }

.slider-dots {
position: absolute;
bottom: 15px;
left: 50%;
transform: translateX(-50%);
display: flex;
gap: 8px;
z-index: 10;
}

.dot {
width: 8px;
height: 8px;
border-radius: 50%;
background: rgba(255, 255, 255, 0.4);
transition: 0.3s;
cursor: pointer;
}

.dot.active {
background: var(--gold);
width: 20px;
border-radius: 4px;
}

.detail-info-box {
flex: 1;
padding: 40px;
display: flex;
flex-direction: column;
justify-content: center;
}

.detail-tag {
color: var(--gold);
font-size: 12px;
letter-spacing: 3px;
text-transform: uppercase;
margin-bottom: 10px;
font-weight: 700;
}

.detail-title {
font-size: 28px;
font-weight: 700;
margin-bottom: 15px;
line-height: 1.3;
}

.detail-price-box {
display: flex;
align-items: center;
gap: 15px;
margin-bottom: 20px;
background: rgba(255,255,255,0.02);
padding: 12px 20px;
border-radius:12px;
border: 1px solid rgba(255,255,255,0.04);
}

.detail-offer { font-size: 24px; font-weight: 700; color: var(--gold); }
.detail-original { font-size: 15px; color: #666; text-decoration: line-through; }
.detail-desc { color: #aaa; font-size: 15px; line-height: 1.7; margin-bottom: 25px; }

.detail-action-btns {
display: flex;
width: 100%;
}

.detail-book-btn {
flex: 1;
padding: 16px;
background: transparent;
color: var(--gold);
border: 1px solid rgba(212, 175, 55, 0.4);
border-radius: 10px;
font-weight: 700;
text-transform: uppercase;
letter-spacing: 1.5px;
cursor: pointer;
text-align: center;
text-decoration: none;
font-size: 13px;
transition: all 0.3s ease;
}

.detail-book-btn:hover {
background: var(--gold);
color: #000;
border-color: var(--gold);
box-shadow: 0 5px 20px rgba(212, 175, 55, 0.2);
}

@media(max-width:768px){

.logo{ font-size:20px; }

nav a:hover{ background:#1c222e; color: var(--gold); }

.store-info-banner {

@media(max-width:768px){

}

.brand-flex-list::-webkit-scrollbar{height:8px}
.brand-flex-list::-webkit-scrollbar-track{background:#121821;border-radius:20px}
.brand-flex-list::-webkit-scrollbar-thumb{background:linear-gradient(90deg,#7a6420,#d4af37,#7a6420);border-radius:20px;border:1px solid #d4af37}
.brand-flex-list{scrollbar-color:#d4af37 #121821;scrollbar-width:thin;}
</style>

let currentCategory = 'door_locks';
let currentSlideIndex = 0;
let totalSlides = 0;

function handleNavClick(menuType) {
    const navLocks = document.getElementById("navLocks");
    const navAccessories = document.getElementById("navAccessories");
    const mobLocks = document.getElementById("mobLocks");
    const mobAccessories = document.getElementById("mobAccessories");
    
    if(navLocks) navLocks.classList.remove("active");
    if(navAccessories) navAccessories.classList.remove("active");
    if(mobLocks) mobLocks.classList.remove("active");
    if(mobAccessories) mobAccessories.classList.remove("active");
    
    if(menuType === 'accessories') {
        if(mobAccessories) mobAccessories.classList.add("active");
        if(navAccessories) navAccessories.classList.add("active");
        
        document.getElementById("categoryTabsOuter").style.display = "none"; 
        document.getElementById("mainHeading").innerText = "PREMIUM ACCESSORIES";
        document.getElementById("mainSub").innerText = "Architectural Hardware & Styling";
        switchCategory('accessories', null);
    } else {
        if(navLocks) navLocks.classList.add("active");
        if(mobLocks) mobLocks.classList.add("active");
        
        document.getElementById("categoryTabsOuter").style.display = "flex"; 
        document.getElementById("mainHeading").innerText = "EXQUISITE COLLECTION";
        document.getElementById("mainSub").innerText = "Filter by Premium Categories";
        
        const firstTab = document.querySelector(".tab-btn");
        switchCategory('door_locks', firstTab);
    }
    
    document.getElementById("nav").classList.remove("show");
    document.getElementById("menuBtn").classList.remove("open");
}

function switchCategory(catName, element) {
    currentCategory = catName;

    if(element) {
        document.querySelectorAll(".tab-btn").forEach(btn => btn.classList.remove("active"));
        element.classList.add("active");
    }

    const filterTitle = document.getElementById("filterTitle");
    const filterList = document.getElementById("filterList");

    if(catName === 'accessories') {
        filterTitle.innerText = "EXPLORE BY ACCESSORY TYPE";
    } else {
        filterTitle.innerText = "FILTER BY BRAND";
    }

    filterList.innerHTML = "";
    document.getElementById("lockGrid").innerHTML = "";

    // "NONE" ബട്ടൺ ലിസ്റ്റിലേക്ക് ചേർക്കുന്നു (ഇത് എപ്പോഴും Active ആയിരിക്കും)
    filterList.innerHTML += `
        <div class="brand-card active" onclick="loadProducts('NONE', this)">
            NONE
        </div>
    `;

    // മറ്റ് ബ്രാൻഡുകൾ ലിസ്റ്റിലേക്ക് ചേർക്കുന്നു
    Object.keys(data[catName]).forEach((filterItem) => {
        filterList.innerHTML += `
            <div class="brand-card" onclick="loadProducts('${filterItem}', this)">
                ${filterItem}
            </div>
        `;
    });

    // തുടക്കത്തിൽ തന്നെ 'NONE' ബട്ടൺ ഓട്ടോമാറ്റിക് ആയി ക്ലിക്ക് ചെയ്യിച്ച് എല്ലാ ബ്രാൻഡും കാണിക്കുന്നു
    const firstFilter = filterList.querySelector(".brand-card");
    if(firstFilter) {
        loadProducts('NONE', firstFilter);
    }
}

function loadProducts(filterKey, element) {
    document.querySelectorAll(".brand-card").forEach(card => card.classList.remove("active"));
    element.classList.add("active");

    const grid = document.getElementById("lockGrid");
    grid.innerHTML = "";

    let itemsToLoad = [];

    // 'NONE' സെലക്ട് ചെയ്തിരിക്കുകയാണെങ്കിൽ ആ കാറ്റഗറിയിലെ മുഴുവൻ പ്രൊഡക്റ്റുകളും ലിസ്റ്റിലേക്ക് എടുക്കുന്നു
    if (filterKey === 'NONE') {
        Object.keys(data[currentCategory]).forEach(key => {
            data[currentCategory][key].forEach(item => {
                itemsToLoad.push({ productData: item, brandTag: key });
            });
        });
    } else {
        // ഒരു പ്രത്യേക ബ്രാൻഡ് മാത്രമാണെങ്കിൽ അത് മാത്രം എടുക്കുന്നു
        data[currentCategory][filterKey].forEach(item => {
            itemsToLoad.push({ productData: item, brandTag: filterKey });
        });
    }

    itemsToLoad.forEach((obj) => {
        const lock = obj.productData;
        const brandTag = obj.brandTag;
        
        const offerPrice = lock[3];
        const origPrice = lock[4];
        
        const discount = (origPrice > offerPrice) ? Math.round(((origPrice - offerPrice) / origPrice) * 100) : 0;

        const titleEscaped = lock[0].replace(/'/g, "\\'");
        const descEscaped = lock[2].replace(/'/g, "\\'");
        const tagEscaped = brandTag.replace(/'/g, "\\'");
        
        const imgsJsonStr = JSON.stringify(lock[1]).replace(/'/g, "\\'");

        grid.innerHTML += `
            <div class="card" onclick='openProductDetail("${titleEscaped}", ${imgsJsonStr}, "${descEscaped}", "${tagEscaped}", ${offerPrice}, ${origPrice})'>
                <div class="img-box">
                    <img src="${lock[1][0]}" alt="${lock[0]}" loading="lazy">
                </div>
                <div class="info">
                    <span class="brand-tag">${brandTag}</span>
                    <h3>${lock[0]}</h3>
                    <p>${lock[2]}</p>
                    <div class="for-more-badge">FOR MORE</div>
                    <div class="price-box">
                        <span class="offer-price">₹${offerPrice.toLocaleString('en-IN')}</span>
                        <span class="original-price">₹${origPrice.toLocaleString('en-IN')}</span>
                        <span class="discount-badge">${discount}% OFF</span>
                    </div>
                    <button class="book-btn" onclick="event.stopPropagation(); window.location.href='form.html?product=' + encodeURIComponent('${titleEscaped} (${tagEscaped})')">Book Now</button>
                </div>
            </div>
        `;
    });
}

function openProductDetail(title, imgArray, desc, tag, offerPrice, origPrice) {
    document.getElementById("detailTitle").innerText = title;
    document.getElementById("detailDesc").innerText = desc;
    document.getElementById("detailTag").innerText = tag;
    
    document.getElementById("detailOfferPrice").innerText = "₹" + offerPrice.toLocaleString('en-IN');
    document.getElementById("detailOriginalPrice").innerText = "₹" + origPrice.toLocaleString('en-IN');
    
    document.getElementById("detailBookBtn").onclick = function() {
        window.location.href = 'form.html?product=' + encodeURIComponent(title + ' (' + tag + ')');
    };

    const sliderWrapper = document.getElementById("sliderWrapper");
    const sliderDots = document.getElementById("sliderDots");
    sliderWrapper.innerHTML = "";
    sliderDots.innerHTML = "";
    
    currentSlideIndex = 0;
    totalSlides = imgArray.length;

    imgArray.forEach((imgUrl, i) => {
        sliderWrapper.innerHTML += `<img src="${imgUrl}" alt="Product Slide ${i+1}">`;
        sliderDots.innerHTML += `<span class="dot ${i === 0 ? 'active' : ''}" onclick="goToSlide(${i})"></span>`;
    });

    updateSliderPosition();

    document.getElementById("productDetailModal").style.display = "flex";
    document.body.style.overflow = "hidden"; 
}

function moveSlider(direction) {
    currentSlideIndex += direction;
    if (currentSlideIndex >= totalSlides) currentSlideIndex = 0;
    if (currentSlideIndex < 0) currentSlideIndex = totalSlides - 1;
    updateSliderPosition();
}

function goToSlide(index) {
    currentSlideIndex = index;
    updateSliderPosition();
}

function updateSliderPosition() {
    const sliderWrapper = document.getElementById("sliderWrapper");
    if(sliderWrapper) sliderWrapper.style.transform = `translateX(-${currentSlideIndex * 100}%)`;
    
    const dots = document.querySelectorAll("#sliderDots .dot");
    dots.forEach((dot, index) => {
        if (index === currentSlideIndex) {
            dot.classList.add("active");
        } else {
            dot.classList.remove("active");
        }
    });
}

function closeProductDetail() {
    document.getElementById("productDetailModal").style.display = "none";
    document.body.style.overflow = "auto"; 
}

window.onclick = function(event) {
    const modal = document.getElementById("productDetailModal");
    if (event.target == modal) {
        closeProductDetail();
    }
}

switchCategory('door_locks', document.querySelector(".tab-btn"));

document.addEventListener('contextmenu', event => event.preventDefault());

document.onkeydown = function(e) {
    if (e.keyCode == 123) { return false; } 
    if (e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) { return false; }
    if (e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) { return false; }
    if (e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) { return false; }
    if (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) { return false; }
}
