<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Premium Doors & Accessories</title>
<link rel="icon" type="image/png" href="logo DOOR.png">

<style>
:root{
--bg:#0b1017;
--gold:#d4af37;
--panel-bg: #141923;
--card-bg: #1c222e;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Segoe UI', Arial, sans-serif;
background:var(--bg);
color:#fff;
overflow-x:hidden;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 8%;
border-bottom:1px solid #222;
position:relative;
z-index: 1000;
}

.logo{
font-size:24px;
font-weight:700;
letter-spacing: 2px;
}

.logo span{
color:var(--gold);
}

.menu{
display:none;
flex-direction:column;
gap:5px;
cursor:pointer;
transition: transform 0.3s ease;
background: none;
border: none;
padding: 5px;
}

.menu span{
width:30px;
height:3px;
background:#fff;
transition: all 0.3s ease;
display: block;
}

/* Hamburger animation */
.menu.open span:nth-child(1) {
transform: rotate(45deg) translate(5px, 6px);
background: var(--gold);
}
.menu.open span:nth-child(2) {
opacity: 0;
}
.menu.open span:nth-child(3) {
transform: rotate(-45deg) translate(5px, -6px);
background: var(--gold);
}

nav{
display:flex;
gap:25px;
align-items:center;
}

nav a{
text-decoration:none;
color:#888;
font-size: 14px;
letter-spacing: 1px;
text-transform: uppercase;
transition: .3s;
cursor: pointer;
padding: 6px 12px;
}

nav a.active, nav a:hover{
color:var(--gold);
}

/* 🌟 COMPUTER-IL ACCESSORIES HIGHLIGHT STYLE 🌟 */
nav a#navAccessories {
border: 1px solid var(--gold);
border-radius: 999px;
color: var(--gold);
padding: 10px 24px;
font-weight: 600;
box-shadow: 0 0 10px rgba(212, 175, 55, 0.1);
transition: all 0.4s ease;
}

nav a#navAccessories:hover, nav a#navAccessories.active {
background: var(--gold);
color: #000 !important;
box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
transform: translateY(-1px);
}

.container{
padding:50px 8%;
}

.panel{
background:linear-gradient(180deg,#141923,#0d1118);
padding:45px;
border-radius:28px;
border: 1px solid rgba(255, 255, 255, 0.03);
}

.heading{
text-align:center;
font-size:38px;
font-weight: 800;
letter-spacing: 2px;
margin-bottom:10px;
text-transform: uppercase;
}

.sub{
text-align:center;
color:var(--gold);
margin-bottom:35px;
font-size: 14px;
letter-spacing: 3px;
text-transform: uppercase;
}

/* MOBILE IN-PAGE NAVIGATION */
.mobile-nav-box {
display: none;
justify-content: center;
gap: 20px;
margin-bottom: 30px;
}

.mobile-nav-link {
font-size: 13px;
letter-spacing: 1.5px;
text-transform: uppercase;
color: #666;
text-decoration: none;
padding: 5px 10px;
border-bottom: 2px solid transparent;
cursor: pointer;
font-weight: 600;
}

.mobile-nav-link.active {
color: var(--gold);
border-color: var(--gold);
}

/* CATEGORY TABS */
.category-tabs {
display: flex;
justify-content: center;
gap: 20px;
margin-bottom: 50px;
border-bottom: 1px solid rgba(255,255,255,0.05);
padding-bottom: 20px;
}

.tab-btn {
background: none;
border: none;
color: #888;
font-size: 16px;
font-weight: 600;
padding: 10px 25px;
cursor: pointer;
transition: .3s;
position: relative;
letter-spacing: 1px;
}

.tab-btn:hover, .tab-btn.active {
color: var(--gold);
}

.tab-btn.active::after {
content: '';
position: absolute;
bottom: -21px;
left: 0;
width: 100%;
height: 2px;
background: var(--gold);
}

/* FILTER PANEL */
.filter-container {
margin-top: 30px;
padding: 25px;
background: rgba(255, 255, 255, 0.01);
border-radius: 20px;
border: 1px solid rgba(255, 255, 255, 0.04);
backdrop-filter: blur(10px);
position: relative;
}

.section-title {
font-size: 12px;
color: #666;
letter-spacing: 3px;
text-transform: uppercase;
margin-bottom: 22px;
text-align: center;
font-weight: 700;
}

.flex-filter-list {
display: flex;
justify-content: center;
gap: 16px;
flex-wrap: wrap;
}

.filter-card {
background: #11151d;
border: 1px solid rgba(255, 255, 255, 0.06);
padding: 16px 40px;
border-radius: 14px;
cursor: pointer;
transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
min-width: 150px;
text-align: center;
font-weight: 600;
font-size: 14px;
letter-spacing: 1.5px;
color: #888;
box-shadow: 0 4px 6px rgba(0, 0, 0, 0.15);
position: relative;
overflow: hidden;
}

.filter-card:hover {
color: #fff;
border-color: rgba(212, 175, 55, 0.4);
background: #181f2a;
transform: translateY(-4px);
box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
}

.filter-card.active {
border-color: var(--gold);
color: var(--gold);
background: linear-gradient(145deg, #1c222e, #11151d);
box-shadow: 0 0 15px rgba(212, 175, 55, 0.15);
font-weight: 700;
}

.filter-card.active::before {
content: '';
position: absolute;
top: 0;
left: 50%;
transform: translateX(-50%);
width: 40%;
height: 3px;
background: var(--gold);
border-radius: 0 0 4px 4px;
}

/* PRODUCT GRID */
.product-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:30px;
margin-top:40px;
}

.card{
background:var(--card-bg);
border-radius:20px;
overflow:hidden;
transition:.4s cubic-bezier(0.165, 0.84, 0.44, 1);
border: 1px solid rgba(255,255,255,0.02);
}

.card:hover{
transform:translateY(-8px);
box-shadow: 0 15px 30px rgba(0,0,0,0.5);
border-color: rgba(214, 175, 55, 0.2);
}

.card .img-box {
width: 100%;
height: 320px;
overflow: hidden;
background: #111;
}

.card img{
width:100%;
height:100%;
object-fit:cover;
display:block;
transition: .5s;
}

.card:hover img {
transform: scale(1.05);
}

.info{
padding:25px;
background: linear-gradient(to bottom, #1c222e, #141923);
}

.info h3{
color:#fff;
font-size: 18px;
margin-bottom: 8px;
font-weight: 600;
}

.info .tag {
font-size: 11px;
color: var(--gold);
text-transform: uppercase;
letter-spacing: 1.5px;
margin-bottom: 12px;
display: inline-block;
}

.info p{
color:#888;
font-size: 14px;
line-height: 1.5;
margin-bottom: 15px;
}

.book-btn {
width: 100%;
padding: 12px;
background: transparent;
border: 1px solid rgba(212, 175, 55, 0.4);
color: var(--gold);
border-radius: 10px;
font-weight: 600;
cursor: pointer;
transition: .3s;
text-transform: uppercase;
letter-spacing: 1px;
font-size: 13px;
}

.book-btn:hover {
background: var(--gold);
color: #000;
border-color: var(--gold);
}

/* RESPONSIVE MEDIA QUERIES & NAVIGATION ANIMATIONS */
@media(max-width:768px){
header{ padding:16px 5%; }
.logo{ font-size:20px; }
.menu{ display:flex; }

/* 🌟 ANIMATED MOBILE DROPDOWN 🌟 */
nav{
display: flex;
position:absolute;
top:75px;
right:15px;
width:240px;
background: rgba(20, 25, 35, 0.96);
backdrop-filter:blur(20px);
padding:18px;
border-radius:20px;
border: 1px solid rgba(255, 255, 255, 0.05);
flex-direction:column;
gap:4px;
z-index:999;
align-items: stretch;

/* Hidden state by default */
opacity: 0;
transform: translateY(-20px) scale(0.95);
pointer-events: none;
transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
}

/* 🌟 Open State Animation 🌟 */
nav.show{ 
opacity: 1; 
transform: translateY(0) scale(1);
pointer-events: auto;
box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
}

nav a{ 
padding:12px 16px; 
border-radius:12px; 
opacity: 0;
transform: translateX(-10px);
transition: all 0.3s ease;
color: #fff;
}

nav a:hover{ background:#1c222e; color: var(--gold); }

/* Sequential Links Fade-in Delay */
nav.show a {
opacity: 1;
transform: translateX(0);
}
nav.show a:nth-child(1) { transition-delay: 0.1s; }
nav.show a:nth-child(2) { transition-delay: 0.15s; }
nav.show a:nth-child(3) { transition-delay: 0.2s; }
nav.show a:nth-child(4) { transition-delay: 0.25s; }

nav a#navAccessories {
border: none;
border-radius: 12px;
padding: 12px 16px;
box-shadow: none;
color: #888;
font-weight: normal;
}
nav a#navAccessories:hover, nav a#navAccessories.active {
background: #1c222e;
color: var(--gold) !important;
box-shadow: none;
transform: none;
}

.mobile-nav-box { display: flex; }

.container{ padding:20px; }
.panel{ padding:25px; border-radius:24px; }
.heading{ font-size:26px; }

.filter-container { padding: 15px; border-radius: 16px; margin-top: 20px;}
.section-title { margin-bottom: 15px; }

.category-tabs {
overflow-x: auto;
justify-content: flex-start;
scrollbar-width: none;
padding-bottom: 10px;
margin-bottom: 30px;
}
.category-tabs::-webkit-scrollbar { display: none; }
.tab-btn { white-space: nowrap; padding: 10px 15px; font-size: 14px; }

.filter-container::after {
content: '';
position: absolute;
top: 50px;
right: 0;
width: 40px;
height: 55px;
background: linear-gradient(to left, #141923, transparent);
pointer-events: none;
z-index: 2;
}

.flex-filter-list { 
justify-content: flex-start; 
overflow-x: auto; 
flex-wrap: nowrap; 
padding-bottom: 12px; 
gap: 12px;
scrollbar-width: auto; 
}

.flex-filter-list::-webkit-scrollbar {
display: block;
height: 3px;
}
.flex-filter-list::-webkit-scrollbar-track {
background: rgba(255, 255, 255, 0.03);
border-radius: 10px;
}
.flex-filter-list::-webkit-scrollbar-thumb {
background: var(--gold);
border-radius: 10px;
opacity: 0.7;
}

.filter-card { min-width: 130px; padding: 12px 25px; font-size: 13px;}
.product-grid{ grid-template-columns:1fr; }
.card .img-box { height: 260px; }
}
</style>
</head>
<body>

<header>
<div class="logo">DOORS<span>&</span>LOCKS</div>
<button class="menu" id="menuBtn" onclick="toggleMenu()">
<span></span><span></span><span></span>
</button>
<nav id="nav">
<a href="home.html">Home</a>
<a class="active" id="navDoors" onclick="handleNavClick('doors')">Doors</a>
<a href="locks.html">Locks</a>
<a id="navAccessories" onclick="handleNavClick('accessories')">Accessories</a>
</nav>
</header>

<div class="container">
<div class="panel">

<div class="heading" id="mainHeading">PREMIUM DOOR DESIGN</div>
<div class="sub" id="mainSub">Filter by Luxury Categories</div>

<div class="mobile-nav-box">
<span class="mobile-nav-link active" id="mobDoors" onclick="handleNavClick('doors')">Doors</span>
<span class="mobile-nav-link" id="mobAccessories" onclick="handleNavClick('accessories')">Accessories</span>
</div>

<div class="category-tabs" id="categoryTabsOuter">
<button class="tab-btn active" onclick="switchCategory('Fibre', this)">FIBRE DOORS</button>
<button class="tab-btn" onclick="switchCategory('Wood', this)">WOODEN DOORS</button>
<button class="tab-btn" onclick="switchCategory('Glass', this)">GLASS DOORS</button>
<button class="tab-btn" onclick="switchCategory('Steel', this)">STEEL DOORS</button>
</div>

<div class="filter-container" id="filterSection">
<div class="section-title" id="filterTitle">FILTER BY BRAND</div>
<div class="flex-filter-list" id="filterList"></div>
</div>

<div class="product-grid" id="productGrid"></div>

</div>
</div>

<script>
function toggleMenu(){
document.getElementById("nav").classList.toggle("show");
document.getElementById("menuBtn").classList.toggle("open");
}

// 🌟 EXPANDED PRODUCT DATA (6 Varieties per Brand/Type) 🌟
const data = {
Fibre: {
"PREMIUM FIBRE": [
["Teak Texture Fibre Door", "https://images.unsplash.com/photo-1600566753190-17f0baa2a6c3", "Waterproof heavy-duty premium fibre door with natural teak finish."],
["Modern Glossy White", "https://images.unsplash.com/photo-1534349762230-e09ff0545e43", "Sleek scratch-resistant high gloss door tailored for bathroom suites."],
["Classic Panel Woodgrain", "https://images.unsplash.com/photo-1507089947368-19c1da9775ae", "Deep molded structural elegance featuring sound dampening tech."],
["Vintage Rosewood Pattern", "https://images.unsplash.com/photo-1512917774080-9991f1c4c750", "Weatherproof outer coat designed to face direct tropical sunlight."],
["Contemporary Matte Grey", "https://images.unsplash.com/photo-1513694203232-719a280e022f", "Architectural flush frame build delivering ultra minimalist luxury style."],
["Abstract Embossed Art Door", "https://images.unsplash.com/photo-1600210492486-724fe5c67fb0", "Reinforced core combined with artistic geometric custom etchings."]
]
},
Wood: {
"SOLID WOOD": [
["Royal Pure Teak Wood", "https://images.unsplash.com/photo-1513694203232-719a280e022f", "Handcrafted authentic internal core teak planks for massive entrances."],
["Antique Carved Mahogany", "https://images.unsplash.com/photo-1540518614846-7eded433c457", "Intricate traditional architectural masterpiece structure with glossy lacquer."],
["Minimalist Walnut Flush", "https://images.unsplash.com/photo-1505693395321-883724634266", "Sleek cross-grain natural walnut wood veneer ideal for modern villas."],
["Premium Solid Oak Entry", "https://images.unsplash.com/photo-1484154218962-a197022b5858", "Heavy structural framework promising extreme durability and insulation."],
["Rustic Pine Barn Door", "https://images.unsplash.com/photo-1507652313519-d4e9174996dd", "Classic sliding hardware configuration styled for custom interior rooms."],
["Luxury Rosewood Double Panel", "https://images.unsplash.com/photo-1600607687920-4e2a09cf159d", "Majestic large profile layout detailed with gold metallic lining accent."]
]
},
Glass: {
"ARCHITECTURAL GLASS": [
["Frosted Privacy Glass Door", "https://images.unsplash.com/photo-1505693416388-ac5ce068fe85", "Heavy 12mm toughened shatterproof glass panel with matte privacy coat."],
["Black Tinted Minimal Frame", "https://images.unsplash.com/photo-1600607687939-ce8a6c25118c", "Industrial aesthetic aluminum black profile border tailored for workspaces."],
["Luxury Fluted Ribbed Glass", "https://images.unsplash.com/photo-1600573472591-ee6b68d14c68", "Trendy crystal ripple glass structure creating beautiful light refractions."],
["Bi-Fold Clear Patio Glass", "https://images.unsplash.com/photo-1600210492493-0946911123ea", "Panoramic heavy gauge outdoor slider framing seamless garden views."],
["Stained Art Glass Panel", "https://images.unsplash.com/photo-1513694203232-719a280e022f", "Bespoke colored geometric glass artwork embedded inside double glazing."],
["Smart Sensor Slide Entry", "https://images.unsplash.com/photo-1497366216548-37526070297c", "Motion activated keyless electronic automatic glass facade system."]
]
},
Steel: {
"SECURITY STEEL": [
["Armored Anti-Theft Steel Door", "https://images.unsplash.com/photo-1506377247377-2a5b3b417ebb", "Multi-point locking security fortress grade door with concrete core fill."],
["Wood-Look Finished Steel", "https://images.unsplash.com/photo-1512915922686-57c11dde9b6b", "The absolute strength of structural steel disguised in premium wood grains."],
["Modern Charcoal Matte Entry", "https://images.unsplash.com/photo-1582268611958-ebfd161ef9cf", "Weatherproof galvanized outer sheet with premium polymer texturing."],
["Copper Embossed Royal Door", "https://images.unsplash.com/photo-1613490493576-7fde63acd811", "Exquisite metal carving patterns styled for premium luxury villas."],
["Industrial Fire-Rated Safe", "https://images.unsplash.com/photo-1549517045-bc93de075e53", "Certified 120-minute thermal fire barrier specialized for safety sectors."],
["Stainless Steel Slimline", "https://images.unsplash.com/photo-1600585154340-be6161a56a0c", "Corrosion resistant grade 314 hairline finish minimal facade layout."]
]
},
accessories: {
"HANDLES": [
["Luxury Brass Pull Handle", "https://picsum.photos/600/400?random=43", "Solid antique brass finished pull bars to elevate entrance doors."],
["Sleek Matt Black Lever", "https://picsum.photos/600/400?random=44", "Minimalist matte black aluminum handles for architectural villas."],
["Crystal Premium Knob Set", "https://picsum.photos/600/400?random=45", "Exquisite designer cut glass knobs providing a royal look."],
["Rose Gold Profile Grip", "https://picsum.photos/600/400?random=46", "Anodized rose gold long profile hardware tailored for high cabinets."],
["Stainless Steel D-Pull", "https://picsum.photos/600/400?random=47", "Satin finish heavy industrial grade long handles for commercial entries."],
["Antique Premium Wooden Handle", "https://picsum.photos/600/400?random=48", "Handcrafted premium teak wood fused with solid brass side clips."]
],
"HINGES": [
["Concealed 3D Steel Hinges", "https://picsum.photos/600/400?random=49", "Heavy-weight stainless steel durable hidden architectural hinges."],
["Ball Bearing Hydraulic Hinge", "https://picsum.photos/600/400?random=50", "Self soft-closing mechanism ensuring completely silent door operations."],
["Brass Butterfly Flush Hinge", "https://picsum.photos/600/400?random=51", "Classic high-strength polished brass hinges for interior windows."],
["Heavy Duty Pivot System", "https://picsum.photos/600/400?random=52", "360-degree rotation axis support designed for massive main villa doors."],
["Stainless Steel Butt Hinge", "https://picsum.photos/600/400?random=53", "High-gauge weatherproof metal layout with smooth graphite rings."],
["Spring Loaded Door Closer Hinge", "https://picsum.photos/600/400?random=54", "Integrated automatic tension spring design avoiding heavy slams."]
]
}
};

let currentCategory = 'Fibre';

function handleNavClick(menuType) {
    document.getElementById("navDoors").classList.remove("active");
    document.getElementById("navAccessories").classList.remove("active");
    document.getElementById("mobDoors").classList.remove("active");
    document.getElementById("mobAccessories").classList.remove("active");
    
    if(menuType === 'accessories') {
        document.getElementById("navAccessories").classList.add("active");
        document.getElementById("mobAccessories").classList.add("active");
        
        document.getElementById("categoryTabsOuter").style.display = "none"; 
        document.getElementById("mainHeading").innerText = "PREMIUM ACCESSORIES";
        document.getElementById("mainSub").innerText = "Architectural Hardware & Door Styling";
        switchCategory('accessories', null);
    } else {
        document.getElementById("navDoors").classList.add("active");
        document.getElementById("mobDoors").classList.add("active");
        
        document.getElementById("categoryTabsOuter").style.display = "flex"; 
        document.getElementById("mainHeading").innerText = "PREMIUM DOOR DESIGN";
        document.getElementById("mainSub").innerText = "Filter by Luxury Categories";
        
        const firstTab = document.querySelector(".tab-btn");
        switchCategory('Fibre', firstTab);
    }
    // Close animated menu smoothly
    document.getElementById("nav").classList.remove("show");
    document.getElementById("menuBtn").classList.remove("open");
}

function switchCategory(catName, element) {
    currentCategory = catName;

    if(element) {
        document.querySelectorAll(".tab-btn").forEach(btn => btn.classList.remove("active"));
        element.classList.add("active");
    }

    const filterTitle = document.getElementById("filterTitle");
    const filterList = document.getElementById("filterList");

    if(catName === 'accessories') {
        filterTitle.innerText = "EXPLORE BY ACCESSORY TYPE";
    } else {
        filterTitle.innerText = "FILTER BY MODEL RANGE";
    }

    filterList.innerHTML = "";
    document.getElementById("productGrid").innerHTML = "";

    Object.keys(data[catName]).forEach((filterItem, index) => {
        const activeClass = index === 0 ? 'active' : '';
        filterList.innerHTML += `
            <div class="filter-card ${activeClass}" onclick="loadProducts('${filterItem}', this)">
                ${filterItem}
            </div>
        `;
    });

    const firstFilter = filterList.querySelector(".filter-card");
    if(firstFilter) {
        firstFilter.click();
    }
}

function loadProducts(filterKey, element) {
    document.querySelectorAll(".filter-card").forEach(card => card.classList.remove("active"));
    element.classList.add("active");

    const grid = document.getElementById("productGrid");
    grid.innerHTML = "";

    data[currentCategory][filterKey].forEach(item => {
        grid.innerHTML += `
            <div class="card">
                <div class="img-box">
                    <img src="${item[1]}" alt="${item[0]}" loading="lazy">
                </div>
                <div class="info">
                    <span class="tag">${filterKey}</span>
                    <h3>${item[0]}</h3>
                    <p>${item[2]}</p>
                    <button class="book-btn" onclick="alert('${item[0]} booking request received!')">Book Now</button>
                </div>
            </div>
        `;
    });
}

// Initial Trigger Load
switchCategory('Fibre', document.querySelector(".tab-btn"));
</script>

</body>
</html>
