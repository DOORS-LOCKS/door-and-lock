 <!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <meta name="description"
content="Explore quality doors and secure lock solutions including wooden doors, fibre doors, front door locks and bathroom locks.">

<meta name="keywords"
content="doors, locks, door locks, front door locks, bathroom locks, wooden doors, fibre doors, security locks, home doors, modern doors">

<meta name="robots"
content="index, follow">

<meta name="author"
content="Doors & Locks">

    <title>DOORS AND LOCKS</title>

    <link rel="icon" href="logo DOOR.png" alt="Modern security door">

    <style>
        :root {
            --bg: #0b0c10;
            --gold: #d4af37;
            --text: #c5c6c7;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            font-family: Helvetica;
            color: var(--text);
            overflow-x: hidden;
        }

        /* HEADER */
        header {
            padding: 20px;
            display: flex;
            justify-content: flex-end; /* ബട്ടൺ വലതുവശത്ത് വരാൻ */
            position: absolute;
            width: 100%;
            top: 0;
            left: 0;
            z-index: 10;
        }

        /* CONTACT BUTTON WITH GOLD SHADE */
        .btn-contact {
            padding: 12px 26px;
            border: 2px solid var(--gold);
            border-radius: 999px;
            text-decoration: none;
            color: white;
            font-weight: bold;
            background: transparent;
            transition: .3s;
            /* Gold Glow Effect */
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.3); 
        }

        .btn-contact:hover {
            background: var(--gold);
            color: black;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.7); /* Hover ചെയ്യുമ്പോൾ ഗ്ലോ കൂടും */
        }

        /* HERO */
        .hero {
            height: 100vh; /* ഹെഡർ അബ്സൊല്യൂട്ട് ആയതുകൊണ്ട് ഫുൾ സ്ക്രീൻ ആക്കി */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            background: linear-gradient(rgba(0, 0, 0, .7),
                    rgba(0, 0, 0, .7)),
                url('https://images.unsplash.com/photo-1513694203232-719a280e022f?q=80&w=1200');
            background-size: cover;
            background-position: center;
        }

        .hero h1 {
            font-size: 55px;
            color: white;
            margin-bottom: 20px;
        }

        .hero span {
            color: var(--gold);
        }

        .hero p {
            max-width: 650px;
            line-height: 1.7;
            margin-bottom: 30px;
        }

        .cta-buttons {
            display: flex;
            gap: 20px;
        }

        .btn {
            padding: 14px 34px;
            text-decoration: none;
            font-weight: bold;
        }

        .btn-gold {
            background: var(--gold);
            color: black;
        }

        .btn-outline {
            border: 2px solid var(--gold);
            color: white;
        }

        footer {
            padding: 30px;
            text-align: center;
        }

        /* MOBILE */
        @media(max-width:768px) {
            header {
                padding: 15px;
            }

            .btn-contact {
                padding: 10px 20px;
                font-size: 14px;
            }

            .hero h1 {
                font-size: 32px;
            }

            .cta-buttons {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>

    <header>
        <!-- Nav പൂർണ്ണമായി ഒഴിവാക്കി ബട്ടൺ മാത്രം നൽകി -->
        <a href="contact.html" class="btn-contact">Contact</a>
    </header>

    <section class="hero">
        <h1>DOORS <span>&</span> LOCKS</h1>
        <p>Experience the perfect blend of luxury, security and timeless elegance.</p>
        <div class="cta-buttons">
            <a href="doors.html" class="btn btn-gold">Explore Doors</a>
            <a href="locks.html" class="btn btn-outline">Explore Locks</a>
        </div>
    </section>

    <footer>
        © 2026 DOORS & LOCKS
    </footer>

</body>

</html>
