<title>DOORS AND LOCKS | Premium Doors & Locks</title>
<link rel="icon" type="image/png" href="logo DOOR.png">

<style>

:root{
--bg:#0b0c10;
--text:#c5c6c7;
--gold:#d4af37;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Helvetica,sans-serif;
background:var(--bg);
color:var(--text);
overflow-x:hidden;
}

/* HEADER */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 8%;
background:#0b0c10;
border-bottom:1px solid #1f2833;
position:sticky;
top:0;
z-index:100;
}

.logo{
font-size:24px;
font-weight:bold;
color:white;
letter-spacing:2px;
}

.logo span{
color:var(--gold);
}

.name span{
color:var(--gold);
}

nav{
display:flex;
gap:12px;
align-items:center;
justify-content:space-between;

}

nav a{

text-decoration:none;

color:white;

padding:12px 22px;

border:1px solid #2a2a2a;

border-radius:999px;

font-size:14px;

transition:.3s;

white-space:nowrap;

}

nav a:hover,
nav a.active{

background:var(--gold);

color:#111;

}

/* HERO */

.hero{

height:80vh;

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

text-align:center;

padding:0 20px;

background:
linear-gradient(
rgba(0,0,0,.7),
rgba(0,0,0,.7)
),

url(
'https://images.unsplash.com/photo-1513694203232-719a280e022f?q=80&w=1200'
);

background-size:cover;

background-position:center;

}

.hero h1{

font-size:52px;

color:white;

margin-bottom:20px;

letter-spacing:2px;

}

.hero p{

font-size:18px;

max-width:650px;

line-height:1.7;

margin-bottom:35px;

}

.cta-buttons{

display:flex;

gap:20px;

}

.btn{

padding:14px 34px;

text-decoration:none;

border-radius:0px;

font-weight:bold;

transition:.3s;

}

.btn-gold{

background:var(--gold);

color:black;

}

.btn-outline{

border:2px solid var(--gold);

color:white;

}

.btn-outline:hover{

background:var(--gold);

color:black;

}

footer{

padding:30px;

text-align:center;

border-top:1px solid #1f2833;

}

/* MOBILE */

@media(max-width:768px){

header{

flex-direction:column;

gap:14px;

padding:16px 5%;

}

nav{

display:flex;

justify-content:center;

align-items:center;

flex-wrap:nowrap;

gap:8px;

width:100%;

overflow-x:auto;

scrollbar-width:none;

}

nav::-webkit-scrollbar{
display:none;
}

nav a{

margin:0;

padding:10px 18px;

border-radius:999px;

flex-shrink:0;

}

.hero{

height:auto;

min-height:70vh;

padding:60px 20px;

}

.hero h1{

font-size:30px;

}

.hero p{

font-size:16px;

}

.cta-buttons{

flex-direction:column;

}

}

@media(max-width:480px){

.logo{

font-size:20px;

}

}

</style>

</head>

<body>
<header>


<nav>

<a href="home.html" class="active">

<svg
xmlns="http://www.w3.org/2000/svg"
width="18"
height="18"

fill="none"
stroke="currentColor"
stroke-width="2"
style="vertical-align:middle;margin-right:8px;">

<path d="M3 10.5L12 3l9 7.5"></path>

<path d="M5 9.5V21h14V9.5"></path>

</svg>

Home

</a>
<a href="contact.html">
Contact
</a>

</nav>

</header>

<section class="hero">

<h1 class="name">

 DOORS <span >&</span> LOCKS

</h1>

<p>

Experience the perfect blend of luxury, security and timeless elegance.

</p>

<div class="cta-buttons">

<a
class="btn btn-gold"
href="doors.html">

Explore Doors

</a>

<a
class="btn btn-outline"
href="locks.html">

Explore Locks

</a>

</div>

</section>

<footer>

© 2026 DOORS & LOCKS  

</footer>

</body>

</html>
